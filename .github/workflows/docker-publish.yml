name: Build and Publish Docker Image (CUDA 12.8)

on:
  push:
    branches: ["cuda12.8"]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  check-updates:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.selfcheck.outputs.needs_update }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Build only the builder stage
        id: build
        run: |
          docker image build --pull --target builder -t temp-builder:${{ github.sha }} .

      - name: Check for pending OS updates
        id: selfcheck
        run: python .github/scripts/check_updates.py

  build-and-push:
    needs: check-updates
    if: >-
      ${{ !failure() && !cancelled() &&
          (github.event_name != 'schedule' ||
           needs.check-updates.outputs.needs_update == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            prefix=cuda12.8-,onlatest=true
          tags: |
            type=schedule,pattern={{date 'YYMMDD'}}
            type=raw,value=latest
            type=sha,format=short

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true
